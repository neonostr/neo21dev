name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove lovable-tagger (Lovable-only dev dependency)
        run: npx json -I -f package.json -e "delete this.devDependencies['lovable-tagger']"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload nsite dist
        uses: actions/upload-artifact@v4
        with:
          name: nsite-dist
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-nsite:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: nsite-dist
          path: dist

      - name: Publish dist to nsite branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: nsite
          force_orphan: true
          commit_message: "chore(nsite): publish build ${{ github.sha }}"

